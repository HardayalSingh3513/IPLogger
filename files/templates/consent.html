<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Continue to site</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <main class="card" data-location-page data-log-id="{{ log_id }}" data-target-url="{{ target_url }}">
    <h1>Continue to website</h1>
    <p class="subtitle">This link can ask your browser for location permission before sending you to the destination.</p>

    <div id="locationStatus" class="notice">
      Choose whether to share your current browser location.
    </div>

    <div class="button-row">
      <button id="shareLocationBtn" class="btn" type="button">Share location</button>
      <button id="skipLocationBtn" class="btn secondary" type="button">Continue without sharing</button>
    </div>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
